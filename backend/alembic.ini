# amvision database migration config

[alembic]
# Migration script path.
# The path is relative to %(here)s, the directory that contains this ini file.
script_location = %(here)s/alembic

# Revision file name template. The default is %%(rev)s_%%(slug)s.
# Uncomment the next line to include date and time in revision file names.
# See https://alembic.sqlalchemy.org/en/latest/tutorial.html#editing-the-ini-file
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
# Revisions can also be grouped into date folders when recursive_version_locations = true.
# file_template = %%(year)d/%%(month).2d/%%(day).2d_%%(hour).2d%%(minute).2d_%%(second).2d_%%(rev)s_%%(slug)s

# Additional sys.path entry. It is prepended to sys.path when present.
# alembic.ini lives under backend/, so add the repository root.
prepend_sys_path = ..


# Time zone used when rendering dates in migration files and file names.
# Requires tzdata when set. The value is passed to ZoneInfo().
# Leave empty to use local time.
# timezone =

# Maximum length for the slug field.
# truncate_slug_length = 40

# Set to 'true' to run env.py during 'revision', even without autogenerate.
# revision_environment = false

# Set to 'true' to detect sourceless .pyc and .pyo files in versions/.
# sourceless = false

# Version locations. Defaults to <script_location>/versions.
# With multiple version locations, the initial revision needs --version-path.
# The separator is controlled by path_separator.
# version_locations = %(here)s/bar:%(here)s/bat:%(here)s/alembic/versions

# path_separator defines the separator for file path lists.
# It applies to options such as version_locations and prepend_sys_path.
# The "os" value uses os.pathsep for cross-platform behavior.
#
# For older alembic.ini files, this default is not applied when omitted.
# If omitted completely, Alembic falls back as follows:
#
# 1. version_locations falls back to "version_path_separator";
#    if that is absent, it falls back to space or comma splitting.
# 2. prepend_sys_path falls back to space, comma, or colon splitting.
#
# Valid values:
#
# path_separator = :
# path_separator = ;
# path_separator = space
# path_separator = newline
#
# Use os.pathsep.
path_separator = os

# Set to 'true' to recursively search source files in version_locations.
# Added in Alembic 1.10.
# recursive_version_locations = false

# Output encoding for revision files generated from script.py.mako.
# output_encoding = utf-8

# Database URL consumed by env.py.
# env.py may override or customize how this URL is resolved.
# alembic.ini lives under backend/, and the SQLite database is under data/.
sqlalchemy.url = sqlite:///../data/amvision.db


[post_write_hooks]
# post_write_hooks define scripts or Python functions run on new revision files.
# See Alembic documentation for details and examples.

# Format with "black" through the console_scripts runner.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Run "ruff" lint and auto-fix through the module runner.
# hooks = ruff
# ruff.type = module
# ruff.module = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# The exec runner can also run executables found in PATH.
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# Logging config used by env.py.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
