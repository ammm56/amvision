# amvision 数据库迁移配置

[alembic]
# 迁移脚本路径
# 相对于 %(here)s（当前 ini 文件所在位置）的路径
script_location = %(here)s/alembic

# 迁移文件命名模板，默认值为 %%(rev)s_%%(slug)s
# 如需在文件名前添加日期时间，可取消下行注释
# 详见 https://alembic.sqlalchemy.org/en/latest/tutorial.html#editing-the-ini-file
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
# 也可按日期组织到子目录（需启用 recursive_version_locations = true）
# file_template = %%(year)d/%%(month).2d/%%(day).2d_%%(hour).2d%%(minute).2d_%%(second).2d_%%(rev)s_%%(slug)s

# sys.path 追加路径，如果存在则会被添加到 sys.path 开头
# alembic.ini 在 backend/ 下，项目根在上一级，需要将项目根目录加入 sys.path
prepend_sys_path = ..


# 迁移文件和文件名中日期渲染使用的时区
# 如需指定，需安装 tzdata 库（可通过 `alembic[tz]` 安装）
# 字符串值会传递给 ZoneInfo()
# 留空则使用本地时间
# timezone =

# slug 字段的最大字符长度
# truncate_slug_length = 40

# 设置为 'true' 可在执行 'revision' 命令时运行环境，无论是否启用 autogenerate
# revision_environment = false

# 设置为 'true' 允许在 versions/ 目录中检测没有源 .py 文件的 .pyc 和 .pyo 文件
# sourceless = false

# 版本位置配置；默认为 <script_location>/versions
# 使用多个版本目录时，初始 revision 必须通过 --version-path 指定
# 此处分隔符应使用下方 "path_separator" 指定的分隔符
# version_locations = %(here)s/bar:%(here)s/bat:%(here)s/alembic/versions

# path_separator 定义文件路径列表的分隔符
# 包括 version_locations 和 prepend_sys_path 等配置项
# 新 alembic.ini 文件默认值为 "os"，使用 os.pathsep 实现跨平台路径分隔
#
# 为兼容旧版 alembic.ini，当 alembic.ini 中未出现 path_separator 时
# 不会应用此默认值。如完全省略此选项，回退逻辑如下：
#
# 1. version_locations 回退到旧版 "version_path_separator" 键
#    如该键也不存在，则回退到按空格和/或逗号分隔的旧版行为
# 2. prepend_sys_path 回退到按空格、逗号或冒号分隔的旧版行为
#
# path_separator 的有效值：
#
# path_separator = :
# path_separator = ;
# path_separator = space
# path_separator = newline
#
# 使用 os.pathsep，新项目的默认配置
path_separator = os

# 设置为 'true' 可在每个 "version_locations" 目录中递归搜索源文件
# Alembic 1.10 新增功能
# recursive_version_locations = false

# 从 script.py.mako 写入 revision 文件时使用的输出编码
# output_encoding = utf-8

# 数据库 URL，仅由用户维护的 env.py 脚本使用
# 也可在 env.py 文件中自定义数据库 URL 配置方式
# 注意：alembic.ini 在 backend/ 下，SQLite 数据库在项目根目录的 data/ 下
sqlalchemy.url = sqlite:///../data/amvision.db


[post_write_hooks]
# post_write_hooks 定义在新生成的 revision 脚本上运行的脚本或 Python 函数
# 详见文档获取更多信息和示例

# 使用 "black" 格式化 - 通过 console_scripts runner 调用 "black" 入口点
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# 使用 "ruff" 进行 lint 并尝试自动修复 - 通过 module runner 调用 "ruff" 模块
# hooks = ruff
# ruff.type = module
# ruff.module = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# 也可使用 exec runner 执行 PATH 中找到的二进制文件
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# 日志配置，同样仅由用户维护的 env.py 脚本使用
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
